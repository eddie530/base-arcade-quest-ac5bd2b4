name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke:
    name: Smoke tests (cooldowns + XP)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run smoke tests
        run: bun run test

      - name: Lint
        run: bun run lint
        continue-on-error: false